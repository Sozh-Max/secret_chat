name: Build production and publish stable link

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-production
  cancel-in-progress: true

jobs:
  build-production:
    runs-on: ubuntu-latest
    outputs:
      build_page_url: ${{ steps.extract.outputs.build_page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo / EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Start EAS production build
        run: |
          eas build --platform android --profile production --non-interactive --json > build-production.json

      - name: Show build json
        run: cat build-production.json

      - name: Extract build page URL
        id: extract
        shell: bash
        run: |
          node -e "const fs=require('fs'); const raw=fs.readFileSync('build-staging.json','utf8'); console.log(raw)"
          URL=$(node -e "const fs=require('fs'); const raw=fs.readFileSync('build-staging.json','utf8'); const data=JSON.parse(raw); const item=Array.isArray(data)?data[0]:data; const url=item?.builds?.[0]?.buildDetailsPageUrl || item?.buildDetailsPageUrl || item?.buildDetailsPage || item?.logsUrl || item?.webUrl || item?.url || ''; process.stdout.write(url)")
          echo "URL=$URL"
          if [ -z \"$URL\" ]; then
            echo 'Could not extract build URL'
            exit 1
          fi
          echo "build_page_url=$URL" >> "$GITHUB_OUTPUT"

  publish-pages:
    needs: build-production
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        shell: bash
        run: |
          mkdir -p site/production
          cp latest-links/template.html site/production/index.html
          sed -i "s|__TARGET_URL__|${{ needs.build-production.outputs.build_page_url }}|g" site/production/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4