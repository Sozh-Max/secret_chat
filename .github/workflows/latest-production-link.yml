name: Build production and publish stable link

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-production
  cancel-in-progress: true

jobs:
  build-production:
    runs-on: ubuntu-latest
    outputs:
      build_page_url: ${{ steps.extract.outputs.build_page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo / EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Start EAS production build
        run: |
          eas build --platform android --profile production --non-interactive --json > build-production.json

      - name: Show build json
        run: cat build-production.json

      - name: Get latest build URL
        id: extract
        run: |
          URL=$(eas build:list --platform android --limit 1 --json | node -e "
            const data = JSON.parse(require('fs').readFileSync(0, 'utf-8'));
            const url = data[0]?.buildDetailsPageUrl || data[0]?.webUrl || '';
            console.log(url);
          ")
          echo "URL=$URL"
          echo "build_page_url=$URL" >> $GITHUB_OUTPUT

  publish-pages:
    needs: build-production
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        shell: bash
        run: |
          mkdir -p site/production
          cp latest-links/template.html site/production/index.html
          sed -i "s|__TARGET_URL__|${{ needs.build-production.outputs.build_page_url }}|g" site/production/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4