name: Build staging and publish stable link

on:
  workflow_dispatch:
  push:
    branches:
      - staging

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-staging
  cancel-in-progress: true

jobs:
  build-staging:
    runs-on: ubuntu-latest
    outputs:
      build_page_url: ${{ steps.extract.outputs.build_page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo / EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Start EAS staging build
        run: eas build --platform android --profile preview --non-interactive

      - name: Read latest EAS build list
        run: eas build:list --platform android --limit 5 --json > latest-builds.json

      - name: Show latest builds JSON
        run: cat latest-builds.json

      - name: Extract latest build page URL
        id: extract
        shell: bash
        run: |
          URL=$(node -e "
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('latest-builds.json', 'utf8'));
          const item = data.find(x => x.status === 'finished' || x.status === 'new' || x.status === 'in-queue') || data[0] || {};
          process.stdout.write(item.buildDetailsPageUrl || '');
          ")
          echo "Detected URL: $URL"
          if [ -z "$URL" ]; then
            echo "Failed to extract buildDetailsPageUrl"
            exit 1
          fi
          echo "build_page_url=$URL" >> "$GITHUB_OUTPUT"

  publish-pages:
    needs: build-staging
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        shell: bash
        run: |
          mkdir -p site/staging
          cp latest-links/template.html site/staging/index.html
          sed -i "s|__TARGET_URL__|${{ needs.build-staging.outputs.build_page_url }}|g" site/staging/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4